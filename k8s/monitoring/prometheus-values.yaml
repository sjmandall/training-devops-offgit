# Prometheus settings
prometheus:
  prometheusSpec:
    retention: 24h
    resources:
      requests:
        memory: 400Mi
        cpu: 200m
      limits:
        memory: 800Mi
        cpu: 500m
    additionalScrapeConfigs:
      - job_name: 'training-site-app'
        static_configs:
          - targets: ['192.168.49.1:80']
        metrics_path: /metrics.php
        scrape_interval: 30s
        scheme: http
        tls_config:
          insecure_skip_verify: true
# Grafana settings
grafana:
  enabled: true
  adminPassword: "admin123"
  service:
    type: NodePort
    nodePort: 32000
  resources:
    requests:
      memory: 128Mi
      cpu: 100m
    limits:
      memory: 256Mi
      cpu: 200m

# Node exporter settings
nodeExporter:
  enabled: true

# Alert manager - disable for simplicity
alertmanager:
  enabled: false

