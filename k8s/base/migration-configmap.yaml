apiVersion: v1
kind: ConfigMap
metadata:
  name: migration-v2-script
  namespace: dev
  labels:
    app: training-site
    version: v2.0.0
data:
  v2_migration.sql: |
    CREATE TABLE IF NOT EXISTS users (
      id         INT AUTO_INCREMENT PRIMARY KEY,
      name       VARCHAR(100),
      email      VARCHAR(100),
      created_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP
    );
    CREATE TABLE IF NOT EXISTS schema_version (
      id          INT AUTO_INCREMENT PRIMARY KEY,
      version     VARCHAR(20) NOT NULL,
      applied_at  TIMESTAMP DEFAULT CURRENT_TIMESTAMP,
      description VARCHAR(255)
    );
    INSERT INTO schema_version (version, description)
    SELECT '2.0.0', 'Added created_at column to users table'
    WHERE NOT EXISTS (
      SELECT 1 FROM schema_version WHERE version = '2.0.0'
    );
    SELECT 'Migration v2.0.0 completed' AS status;
    SHOW TABLES;
    DESCRIBE users;

