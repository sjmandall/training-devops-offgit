apiVersion: apps/v1
kind: Deployment
metadata:
  name: training-site
  labels:
    app: training-site
spec:
  replicas: 1
  selector:
    matchLabels:
      app: training-site
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: training-site
    spec:
      containers:
        - name: training-site
          image: training-site:1.0.0
          imagePullPolicy: Never
          ports:
            - containerPort: 80
          envFrom:
            - configMapRef:
                name: training-site-config
            - secretRef:
                name: training-site-secret
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 15
            periodSeconds: 20
            failureThreshold: 3
